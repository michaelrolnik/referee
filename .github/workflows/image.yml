# Build + test Referee; publish the runtime image to GHCR on tags (the studio §110 consumer pins these).
name: image
on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

jobs:
  build-test-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Build image (runs the full compile)
        run: docker build -t referee:ci .

      - name: Smoke — the tool's own logic traces (pass must pass, fail must fail)
        run: |
          docker run --rm -v "$PWD":/w referee:ci execute /w/test/logic/pass.ref /w/test/logic/data.csv --conf /w/test/logic/conf.csv
          if docker run --rm -v "$PWD":/w referee:ci execute /w/test/logic/fail.ref /w/test/logic/data.csv --conf /w/test/logic/conf.csv; then
            echo "fail.ref unexpectedly passed"; exit 1
          fi

      - name: Push to GHCR (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMG=ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}
          docker tag referee:ci "$IMG"
          docker push "$IMG"
